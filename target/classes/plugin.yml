name: Sacks
version: 1.0.0
main: dev.sacks.plugin.SacksPlugin
api-version: 1.20
author: EternaSMP
description: sacks that auto-collect items
commands:
  sack:
    description: Give yourself a sack
    usage: /sack <foraging|mining|farming|fishing|combat|digger> [player]
    permission: sacks.give
  bas:
    description: Open your Bag of Sacks
    usage: /bas
    permission: sacks.use
permissions:
  sacks.give:
    description: Allows giving sacks
    default: op
  sacks.use:
    description: Allows using sacks
    default: true
